<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate Pro | The Ultimate Suite</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] { 
            --bg: #0b0f1a; --card: #161b2c; --text: #f8fafc; --accent: #3b82f6; 
            --border: #2d364d; --sidebar: #060912; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Layout */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 100; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }

        .pomo-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 20px; text-align: center; }
        #pomo-time { font-size: 1.6rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        .pomo-controls { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .pomo-adj { background: rgba(255,255,255,0.05); border: none; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        .pomo-btn { background: var(--accent); border: none; color: white; padding: 6px 15px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; font-weight: 800; }

        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .view { display: none; width: 100%; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .view.active { display: flex; flex-direction: column; }

        /* Custom Dropdown */
        .custom-select { position: relative; width: 200px; user-select: none; }
        .select-trigger { 
            background: var(--card); border: 1px solid var(--border); padding: 8px 14px; 
            border-radius: 12px; color: white; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; font-size: 0.8rem; font-weight: 600;
        }
        .options-list { 
            position: absolute; top: 110%; left: 0; width: 100%; background: var(--card); 
            border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .options-list.active { display: block; }
        .option-item { padding: 10px 14px; font-size: 0.8rem; cursor: pointer; }
        .option-item:hover { background: rgba(255,255,255,0.05); }

        /* Whiteboard */
        #wb-box { flex: 1; position: relative; background: #ffffff; cursor: crosshair; overflow: hidden; }
        #wb-canvas { position: absolute; top: 0; left: 0; }
        .wb-tools { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 10px 20px; border-radius: 50px; display: flex; gap: 10px; border: 1px solid var(--border); z-index: 200; align-items: center; }
        .tool-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .tool-btn.active, .tool-btn:hover { background: var(--accent); color: white; }

        /* AI Assistant UI */
        .lesson-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .lesson-step { margin-bottom: 20px; opacity: 0.3; transition: 0.5s; padding: 20px; border-radius: 16px; border: 1px solid transparent; }
        .lesson-step.active { opacity: 1; background: rgba(59, 130, 246, 0.05); border-color: var(--accent); }
        .lesson-step.active .highlight { color: var(--accent); font-weight: 800; text-decoration: underline; }
        .lesson-progress { position: absolute; top: 0; left: 0; height: 4px; background: var(--accent); transition: width 0.3s; width: 0%; }
        .visual-stage { background: #000; border-radius: 16px; height: 250px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .visual-stage svg { max-width: 100%; max-height: 100%; }

        /* Flashcards */
        .study-grid { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; max-width: 900px; margin: 0 auto; width: 100%; }
        .flashcard { background: var(--card); width: 100%; min-height: 400px; border-radius: 32px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: 0.3s; padding: 60px; position: relative; }
        .card-content { font-size: 1.8rem; line-height: 1.5; }
        .card-meta { position: absolute; top: 25px; left: 30px; font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        /* Deck Manager */
        .deck-list { display: flex; flex-direction: column; gap: 15px; padding: 20px 0; }
        .deck-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .action-btn { border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-left: 5px; }
        .edit-btn { background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        .delete-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        #notif-toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: white; padding: 16px 24px; border-radius: 16px; display: none; z-index: 10000; font-weight: 600; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="notif-toast"></div>

<nav id="sidebar">
    <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 25px; color: var(--accent);">STUDYMATE PRO</div>
    
    <div class="pomo-box">
        <div id="pomo-time">25:00</div>
        <div class="pomo-controls">
            <button class="pomo-adj" onclick="adjTimer(-300)">-5</button>
            <button class="pomo-adj" onclick="adjTimer(-60)">-1</button>
            <button class="pomo-adj" onclick="adjTimer(60)">+1</button>
            <button class="pomo-adj" onclick="adjTimer(300)">+5</button>
        </div>
        <button class="pomo-btn" id="pomo-start" onclick="togglePomo()">START SESSION</button>
    </div>

    <div class="nav-item active" id="nav-study" onclick="setView('study')">Study Session</div>
    <div class="nav-item" id="nav-assistant" onclick="setView('assistant')">AI Assistant</div>
    <div class="nav-item" id="nav-deck" onclick="setView('deck')">Deck Manager</div>
    <div class="nav-item" id="nav-whiteboard" onclick="setView('whiteboard')">Whiteboard</div>
    <div class="nav-item" id="nav-social" onclick="setView('social')">Friends Hub</div>
    
    <div class="user-block" style="margin-top: auto;">
        <div id="my-pfp" class="pfp-wrap"></div>
        <div id="user-name" style="font-size:0.8rem; font-weight:700;">User</div>
    </div>
</nav>

<main>
    <!-- Study View -->
    <div id="view-study" class="view active">
        <div class="study-grid">
            <div style="display:flex; justify-content: space-between; width: 100%; margin-bottom: 20px;">
                <div class="custom-select">
                    <div class="select-trigger" onclick="toggleCatDropdown()">
                        <span id="cat-label">All Subjects</span> ▾
                    </div>
                    <div class="options-list" id="cat-options"></div>
                </div>
                <div id="deck-stats" style="font-size:0.7rem; font-weight:800; color:var(--accent);">0 CARDS REMAINING</div>
            </div>

            <div class="flashcard" id="card-box" onclick="flip()">
                <div class="card-meta" id="card-side-label">QUESTION</div>
                <div id="card-content" class="card-content">Type a topic to start.</div>
            </div>
            
            <div id="srs-btns" style="display:none; gap:10px; width:100%; margin-top:20px;">
                <button onclick="rate('hard')" style="flex:1; background:var(--danger); border:none; padding:15px; border-radius:12px; color:white; font-weight:800; cursor:pointer;">HARD</button>

            <div style="margin-top: auto; width: 100%; display:flex; gap:10px; background:var(--card); padding:10px; border-radius:18px; border:1px solid var(--border);">
                <input type="text" id="ai-in" placeholder="Topic for AI or Subject | Question | Answer..." style="flex:1; background:none; border:none; color:white; outline:none;">
                <button onclick="handleGen()" style="background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:10px; font-weight:800; cursor:pointer;">GENERATE</button>
            </div>
        </div>
    </div>

    <!-- AI Assistant View -->
    <div id="view-assistant" class="view">
        <div style="padding:40px; max-width:900px; margin:0 auto; width:100%;">
            <div style="margin-bottom: 30px; text-align: center;">
                <h2 style="font-weight: 800; font-size: 2rem;">AI Teaching Assistant</h2>
                <p style="opacity: 0.6;">I'll explain complex topics with diagrams, examples, and analogies.</p>
                
                <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                    <select id="assistant-voice" style="background:var(--card); color:white; border:1px solid var(--border); padding:8px; border-radius:8px;">
                        <option value="Kore">Voice: Kore (Natural)</option>
                        <option value="Zephyr">Voice: Zephyr (Clear)</option>
                        <option value="Leda">Voice: Leda (Calm)</option>
                    </select>
                    <input type="text" id="assistant-topic" placeholder="e.g. How does Quantum Entanglement work?" style="flex:1; background:var(--card); border:1px solid var(--border); color:white; padding:10px 20px; border-radius:14px; outline:none;">
                    <button onclick="startLesson()" style="background:var(--accent); color:white; border:none; padding:10px 25px; border-radius:14px; font-weight:800; cursor:pointer;">START LESSON</button>
                </div>
            </div>

            <div id="lesson-container" style="display:none;">
                <div class="lesson-card">
                    <div class="lesson-progress" id="lesson-bar"></div>
                    <div class="visual-stage" id="visual-stage">

                    </div>
                    <div id="lesson-steps-target">
                        <!-- Paragraphs will appear here -->

                </div>
                <div style="display:flex; gap:10px; justify-content: center;">
                    <button onclick="stopLesson()" style="background:rgba(255,255,255,0.05); color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Cancel Lesson</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-deck" class="view">
        <div style="padding:40px; max-width:800px; margin:0 auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0;">Deck Manager</h2>
                <button onclick="publishDeck()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:800; cursor:pointer;">PUBLISH DECK</button>
            </div>
            <div id="deck-list-container" class="deck-list"></div>
        </div>
    </div>

    <div id="view-whiteboard" class="view">
        <div class="room-bar">
            <span class="room-status" id="room-display">LOCAL</span>

            <button onclick="joinAbly()" style="background:var(--accent); color:white; border:none; padding:4px 10px; border-radius:6px; font-size:0.7rem; font-weight:800; cursor:pointer;">JOIN</button>
            <button onclick="hostAbly()" style="background:var(--success); color:white; border:none; padding:4px 10px; border-radius:6px; font-size:0.7rem; font-weight:800; cursor:pointer;">HOST</button>
            <div id="presence-list" style="display:flex; gap:5px; margin-left:10px;"></div>
        </div>
        <div id="wb-box">
            <canvas id="wb-canvas"></canvas>
            <div class="wb-tools">
                <button class="tool-btn" id="pointer-btn" onclick="setMode('pointer')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg></button>
                <button class="tool-btn active" id="draw-btn" onclick="setMode('draw')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/></svg></button>
                <button class="tool-btn" id="eraser-btn" onclick="setMode('eraser')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l4-4 4-4 5 5 4-4 4 4-4 4-5-5-4 4 4 4z"/></svg></button>
                <button class="tool-btn" onclick="addWbText()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg></button>
                <button class="tool-btn" onclick="takeSnapshot()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
                <input type="color" id="wb-color" class="color-input" value="#3b82f6" onchange="wbColor=this.value">
            </div>
        </div>
    </div>

    <div id="view-social" class="view">
        <div style="padding:40px; max-width:500px; margin:0 auto;">
            <h2>Friends Hub</h2>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <div style="font-size:0.7rem; font-weight:800; opacity:0.6;">MY ID</div>
                <div id="my-puter-id" style="font-family:monospace; margin:10px 0; word-break:break-all; font-size:0.8rem;">...</div>
                <button onclick="copyId()" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Copy ID</button>
            </div>
            <div style="margin-top: 20px;">
                <input type="text" id="friend-id-input" placeholder="Paste Puter ID..." style="width:100%; padding:15px; background:rgba(0,0,0,0.1); border:1px solid var(--border); border-radius:12px; color:white; outline:none; margin-bottom:10px;">
                <button onclick="addFriend()" style="width:100%; background:var(--accent); color:white; border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">ADD FRIEND</button>
            </div>
            <div id="friends-list-ui" style="margin-top:20px;"></div>
        </div>
    </div>
</main>

<script>
    const ABLY_KEY = "xTLjRw.7-yVUg:GK9phICjvxzGuZ6twIpLPJVh1Ek92fL20YVT9RTJnfE";
    const apiKey = ""; // Managed by environment

    let deck = [], friends = [], wbLayers = [], flipped = false;
    let mode = 'draw', offsetX = 0, offsetY = 0, isMousedown = false, lastX, lastY;
    let currentUser = null, wbColor = '#3b82f6', activeRoom = null, ably = null, channel = null;
    let pomoTime = 1500, pomoActive = false, pomoInt = null, selectedCat = "All";
    let lessonActive = false, currentAudio = null;

    const canvas = document.getElementById('wb-canvas'), ctx = canvas.getContext('2d');

    window.onload = async () => {
        try {
            if (!puter.auth.isSignedIn()) await puter.auth.signIn();
            currentUser = await puter.auth.getUser();
            document.getElementById('user-name').innerText = currentUser.username;
            document.getElementById('my-puter-id').innerText = currentUser.uuid || currentUser.id;

            const d = await puter.kv.get('sm_deck_v13');
            if(d) deck = JSON.parse(d);

            const l = await puter.kv.get('sm_wb_v13');
            if(l) {
                wbLayers = await Promise.all(JSON.parse(l).map(async obj => {
                    if(obj.type === 'image') {
                        const img = new Image(); img.src = obj.src;
                        await new Promise(r => img.onload = r);
                        return { ...obj, img };
                    }
                    return obj;
                }));
            }
            
            initWb(); resizeWb(); refresh(); redrawBoard(); setupKeyboard(); updateCategories();
        } catch (e) { console.error(e); }
    };

    // --- AI Teaching Assistant (The Main Add) ---
    async function startLesson() {
        const topic = document.getElementById('assistant-topic').value;
        if(!topic) return showToast("Enter a topic first!");
        
        lessonActive = true;
        document.getElementById('lesson-container').style.display = 'block';
        document.getElementById('lesson-steps-target').innerHTML = "Generating lesson...";
        document.getElementById('visual-stage').innerHTML = "";
        
        try {
            const systemPrompt = `You are a professional teaching assistant. Create a 4-step lesson about the topic. 
            Format the response as a JSON array of objects. Each object MUST have:
            - text: A paragraph of explanation (max 3 sentences).
            - highlight: A key phrase from the text to bold/underline.
            - visual: A short description of a simple diagram (e.g., 'A circle with arrows pointing out').
            Use $ for math formulas.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const resp = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    contents: [{ parts: [{ text: topic }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await resp.json();
            const lesson = JSON.parse(data.candidates[0].content.parts[0].text);
            
            runLessonSequence(lesson);
        } catch (e) {
            console.error(e);
            showToast("Failed to generate lesson.");
        }
    }

    async function runLessonSequence(lesson) {
        const target = document.getElementById('lesson-steps-target');
        const bar = document.getElementById('lesson-bar');
        const visual = document.getElementById('visual-stage');
        const voice = document.getElementById('assistant-voice').value;
        target.innerHTML = "";

        for(let i=0; i<lesson.length; i++) {
            if(!lessonActive) break;
            
            const step = lesson[i];
            const stepDiv = document.createElement('div');
            stepDiv.className = "lesson-step active";
            const processedText = step.text.replace(step.highlight, `<span class="highlight">${step.highlight}</span>`);
            stepDiv.innerHTML = `<p>${processedText}</p>`;
            target.appendChild(stepDiv);
            
            bar.style.width = `${((i+1)/lesson.length)*100}%`;
            
            // Render basic "Diagram" (Placeholder logic for real SVG generation)
            visual.innerHTML = `<div style="color:var(--accent); font-weight:bold;">[Diagram: ${step.visual}]</div>`;
            
            if(window.MathJax) await MathJax.typesetPromise([stepDiv]);

            // Speak step
            await speakAI(step.text, voice);
            
            stepDiv.classList.remove('active');
            stepDiv.style.opacity = "0.5";
        }
        
        lessonActive = false;
        showToast("Lesson complete!");
    }

    function stopLesson() {
        lessonActive = false;
        if(currentAudio) currentAudio.pause();
        document.getElementById('lesson-container').style.display = 'none';
    }

    // --- Reliable TTS Engine ---
    async function speakAI(text, voice = "Kore") {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text }] }],
            generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
            },
            model: "gemini-2.5-flash-preview-tts"
        };
        
        try {
            const resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            const result = await resp.json();
            const audioData = result.candidates[0].content.parts[0].inlineData.data;
            await playPCM(audioData);
        } catch (e) { console.error(e); }
    }

    async function playPCM(base64) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        const arrayBuffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
        const wavBuffer = pcmToWav(arrayBuffer, 24000);
        const audioBuffer = await audioCtx.decodeAudioData(wavBuffer);
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.start();
        return new Promise(r => source.onended = r);
    }

    function pcmToWav(pcmBuffer, sampleRate) {
        const buffer = new ArrayBuffer(44 + pcmBuffer.byteLength);
        const view = new DataView(buffer);
        const writeString = (off, s) => { for(let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
        writeString(0, 'RIFF'); view.setUint32(4, 32 + pcmBuffer.byteLength, true);
        writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true); view.setUint16(34, 16, true);
        writeString(36, 'data'); view.setUint32(40, pcmBuffer.byteLength, true);
        new Uint8Array(buffer, 44).set(new Uint8Array(pcmBuffer));
        return buffer;
    }

    // --- Whiteboard (Zero Lag + Real Eraser) ---
    function resizeWb() { canvas.width = 4000; canvas.height = 4000; redrawBoard(); }
    function redrawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.fillStyle="#cbd5e1";
        for(let x=20;x<canvas.width;x+=40) for(let y=20;y<canvas.height;y+=40) { ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
        wbLayers.forEach(l => {
            if(l.type === 'image') ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
            else if(l.type === 'path') {
                ctx.beginPath(); ctx.strokeStyle=l.color; ctx.lineWidth=3; ctx.lineCap="round"; ctx.lineJoin="round";
                ctx.moveTo(l.points[0].x, l.points[0].y); l.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            } else if(l.type === 'text') {
                ctx.font = "bold 24px Inter"; ctx.fillStyle = l.color; ctx.fillText(l.content, l.x, l.y);
            }
        });
    }

    function initWb() {
        const getP = (e) => ({ x: e.clientX - canvas.getBoundingClientRect().left, y: e.clientY - canvas.getBoundingClientRect().top });
        canvas.onmousedown = (e) => {
            isMousedown = true; const p = getP(e); [lastX, lastY] = [p.x, p.y];
            if(mode === 'pointer') {
                selectedObject = [...wbLayers].reverse().find(l => p.x > l.x && p.x < l.x+(l.w||100) && p.y > l.y && p.y < l.y+(l.h||24));
                if(selectedObject) {
                    wbLayers = wbLayers.filter(o => o !== selectedObject);
                    wbLayers.push(selectedObject); // Layering: Move to front
                }
                redrawBoard();
            } else if(mode === 'draw') {
                wbLayers.push({ type: 'path', color: wbColor, points: [p] });
                if(channel) channel.publish('draw', { type: 'start', x: p.x, y: p.y, color: wbColor });
            }
        };
        canvas.onmousemove = (e) => {
            if(!isMousedown) return;
            const p = getP(e);
            if(mode === 'drag') { offsetX += (e.clientX - lastX); offsetY += (e.clientY - lastY); canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`; }
            else if(mode === 'pointer' && selectedObject) { selectedObject.x += (p.x - lastX); selectedObject.y += (p.y - lastY); redrawBoard(); }
            else if(mode === 'draw') {
                wbLayers[wbLayers.length-1].points.push(p);
                ctx.beginPath(); ctx.strokeStyle=wbColor; ctx.lineWidth=3; ctx.lineCap="round";
                ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.stroke();
                if(channel) channel.publish('draw', { type: 'move', x: p.x, y: p.y, color: wbColor });
            } else if(mode === 'eraser') {
                const r = 25; // Erase radius
                wbLayers = wbLayers.filter(l => {
                    if(l.type === 'path') return !l.points.some(pt => Math.hypot(pt.x-p.x, pt.y-p.y) < r);
                    return !(p.x > l.x && p.x < l.x+(l.w||100) && p.y > l.y && p.y < l.y+(l.h||24));
                });
                redrawBoard();
            }
            [lastX, lastY] = [p.x, p.y];
        };
        canvas.onmouseup = () => { isMousedown = false; if(channel) channel.publish('draw', { type: 'stop' }); saveWb(); };
    }

    // --- Ably & Room Handlers ---
    function hostAbly() { const id = Math.random().toString(36).substring(2,6).toUpperCase(); document.getElementById('room-input').value = id; joinAbly(); }
    function joinAbly() {
        const id = document.getElementById('room-input').value.trim().toUpperCase();
        if(!id || ABLY_KEY.includes("INSERT")) return;
        activeRoom = id; ably = new Ably.Realtime(ABLY_KEY); channel = ably.channels.get(id);
        channel.subscribe('draw', (msg) => {
            if(msg.clientId === currentUser.id) return;
            const { type, x, y, color } = msg.data;
            if(type === 'start') { wbLayers.push({ type: 'path', color, points: [{x, y}] }); }
            else if(type === 'move') { wbLayers[wbLayers.length-1].points.push({x, y}); redrawBoard(); }
        });
        channel.subscribe('sync', (msg) => { if(msg.clientId !== currentUser.id) applyRemote(msg.data.layers); });
        showToast("Connected: " + id);
    }
    async function applyRemote(raw) {
        wbLayers = await Promise.all(raw.map(async obj => {
            if(obj.type === 'image') {
                const img = new Image(); img.src = obj.src;
                await new Promise(r => img.onload = r);
                return { ...obj, img };
            }
            return obj;
        }));
        redrawBoard();
    }

    // --- SRS & Decks ---
    function toggleCatDropdown() { document.getElementById('cat-options').classList.toggle('active'); }
    function selectCat(c) { selectedCat = c; document.getElementById('cat-label').innerText = c; toggleCatDropdown(); refresh(); }
    function updateCategories() {
        const cats = ["All", ...new Set(deck.map(c => c.category))];
        document.getElementById('cat-options').innerHTML = cats.map(c => `<div class="option-item" onclick="selectCat('${c}')">${c}</div>`).join('');
    }
    function refresh() {
        const filtered = selectedCat === "All" ? deck : deck.filter(c => c.category === selectedCat);
        document.getElementById('deck-stats').innerText = `${filtered.length} CARDS REMAINING`;
        if(filtered.length > 0) {
            document.getElementById('card-content').innerHTML = flipped ? filtered[0].back : filtered[0].front;
            document.getElementById('card-side-label').innerText = flipped ? "ANSWER" : "QUESTION";
        } else document.getElementById('card-content').innerText = "Empty subject.";
        if(window.MathJax) MathJax.typesetPromise();
    }
    function flip() { if(deck.length === 0) return; flipped = !flipped; document.getElementById('srs-btns').style.display = flipped ? 'flex' : 'none'; refresh(); }
    function rate(diff) {
        const card = deck.shift();
        if(diff === 'hard') deck.splice(1,0,card); else deck.push(card);
        flipped = false; document.getElementById('srs-btns').style.display='none';
        saveDeck(); refresh();
    }

    // --- Helpers ---
    function setView(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.getElementById(`view-${v}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        if(document.getElementById('nav-'+v)) document.getElementById('nav-'+v).classList.add('active');
        if(v === 'whiteboard') redrawBoard();
        if(v === 'deck') renderDeck();
    }
    function showToast(m) { const t = document.getElementById('notif-toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    function setMode(m) { mode = m; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById(m+'-btn').classList.add('active'); }
    function copyId() { navigator.clipboard.writeText(document.getElementById('my-puter-id').innerText).then(() => showToast("ID Copied!")); }
    async function saveDeck() { await puter.kv.set('sm_deck_v13', JSON.stringify(deck)); updateCategories(); }
    function setupKeyboard() {
        window.onkeydown = (e) => {
            if((e.key === 'Delete' || e.key === 'Backspace') && selectedObject) {
                wbLayers = wbLayers.filter(l => l !== selectedObject); selectedObject = null; redrawBoard(); saveWb();
            }
        };
    }
    async function saveWb() {
        const meta = wbLayers.map(l => { const {img, ...rest} = l; return rest; });
        await puter.kv.set('sm_wb_v13', JSON.stringify(meta));
        if(channel) channel.publish('sync', { layers: meta });
    }
</script>
