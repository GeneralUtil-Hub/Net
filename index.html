<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaris Collaborative Board</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.ably.com/lib/spaces.min-0.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #f8f9fa; }
        #ui-layer { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; }
        canvas { cursor: none; background: white; touch-action: none; display: block; }
        
        /* Cursor Styling */
        .remote-cursor {
            position: absolute;
            pointer-events: none;
            width: 12px;
            height: 12px;
            background: black;
            border-radius: 50%;
            z-index: 50;
            transition: transform 0.1s linear;
        }
        .cursor-label {
            position: absolute;
            top: 15px;
            left: 10px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            border-radius: 4px;
            white-space: nowrap;
        }

        /* Overlay */
        #setup-overlay { position: fixed; inset: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 200; color: white; }
        .modal { background: #2a2a2a; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #444; }
        input { padding: 12px; width: 220px; border: none; border-radius: 8px; margin: 10px 0; font-size: 1rem; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="modal">
            <h1>Solaris Board</h1>
            <input type="text" id="nameInput" placeholder="Your Name"><br>
            <input type="text" id="roomInput" placeholder="Room Name (e.g. game-dev)"><br>
            <button onclick="joinRoom()">Join Session</button>
        </div>
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="panel">
            <b id="roomLabel"></b>
            <input type="color" id="colorPicker" value="#000000">
            <button id="clearBtn" style="background:#dc3545">Clear</button>
        </div>
    </div>

    <div id="cursor-container"></div>
    <canvas id="whiteboard"></canvas>

    <script>
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const cursorContainer = document.getElementById('cursor-container');
        
        let ably, spaces, space, mySpaceMember, channel;
        let drawing = false;
        let myColor = '#000000';
        let userLastPos = {}; // KEY FIX: Store last position for EVERY user

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        async function joinRoom() {
            const name = document.getElementById('nameInput').value || 'Guest';
            const room = document.getElementById('roomInput').value.trim().toLowerCase() || 'main';
            if(!room) return;

            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('roomLabel').innerText = "Room: " + room;

            // 1. Setup Ably & Spaces
            ably = new Ably.Realtime('xTLjRw.7-yVUg:GK9phICjvxzGuZ6twIpLPJVh1Ek92fL20YVT9RTJnfE'); // <-- REPLACE THIS
            spaces = new Spaces(ably);
            space = await spaces.get(room);
            channel = ably.channels.get('draw-' + room);

            // 2. Enter Space (Presence)
            mySpaceMember = await space.enter({ name: name, color: myColor });

            // 3. Listen for Cursors
            space.cursors.subscribe('update', (cursorUpdate) => {
                if (cursorUpdate.clientId === ably.auth.clientId) return;
                updateRemoteCursor(cursorUpdate);
            });

            // 4. Listen for Drawing
            channel.subscribe('draw', (msg) => {
                const { x, y, color, userId, type } = msg.data;
                if (userId === ably.auth.clientId) return;

                if (type === 'start') {
                    userLastPos[userId] = { x, y };
                } else if (type === 'move') {
                    drawSegment(userLastPos[userId].x, userLastPos[userId].y, x, y, color);
                    userLastPos[userId] = { x, y };
                } else {
                    delete userLastPos[userId];
                }
            });

            channel.subscribe('clear', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
        }

        // DRAWING LOGIC
        function drawSegment(x1, y1, x2, y2, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.closePath();
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            const x = e.clientX;
            const y = e.clientY;
            userLastPos['me'] = { x, y };
            channel.publish('draw', { x, y, color: myColor, userId: ably.auth.clientId, type: 'start' });
        });

        canvas.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Update Space Cursor position
            if(space) space.cursors.set({ position: { x, y } });

            if (!drawing) return;

            drawSegment(userLastPos['me'].x, userLastPos['me'].y, x, y, myColor);
            channel.publish('draw', { x, y, color: myColor, userId: ably.auth.clientId, type: 'move' });
            userLastPos['me'] = { x, y };
        });

        window.addEventListener('mouseup', () => {
            if(!drawing) return;
            drawing = false;
            channel.publish('draw', { type: 'end', userId: ably.auth.clientId });
        });

        // CURSOR UI LOGIC
        function updateRemoteCursor(update) {
            let cursorEl = document.getElementById(`cursor-${update.clientId}`);
            if (!cursorEl) {
                cursorEl = document.createElement('div');
                cursorEl.id = `cursor-${update.clientId}`;
                cursorEl.className = 'remote-cursor';
                cursorEl.innerHTML = `<div class="cursor-label">${update.data.name || 'User'}</div>`;
                cursorContainer.appendChild(cursorEl);
            }
            cursorEl.style.transform = `translate(${update.position.x}px, ${update.position.y}px)`;
        }

        document.getElementById('clearBtn').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', {});
        };

        document.getElementById('colorPicker').onchange = (e) => {
            myColor = e.target.value;
            if(space) space.enter({ color: myColor });
        };
    </script>
</body>
</html>
