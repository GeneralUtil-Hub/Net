<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate Pro | Real-Time Collaboration</title>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] { 
            --bg: #0b0f1a; --card: #161b2c; --text: #f8fafc; --accent: #3b82f6; 
            --border: #2d364d; --sidebar: #060912; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 100; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .nav-item.active { background: var(--accent); color: white; }
        .user-block { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-top: auto; border: 1px solid var(--border); }
        .pfp-wrap { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: var(--accent); display: flex; align-items: center; justify-content: center; }

        main { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .view { display: none; width: 100%; height: 100%; overflow-y: auto; }
        .view.active { display: flex; flex-direction: column; }

        /* Whiteboard */
        #wb-box { flex: 1; position: relative; background: #ffffff; cursor: crosshair; overflow: hidden; }
        #wb-canvas { position: absolute; top: 0; left: 0; background: transparent; transform-origin: 0 0; }
        .wb-tools { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 8px 16px; border-radius: 50px; display: flex; gap: 8px; border: 1px solid var(--border); z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tool-btn { background: transparent; border: none; color: #94a3b8; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .tool-btn.active { background: var(--accent); color: white; }
        
        .room-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; z-index: 200; }
        .presence-list { display: flex; gap: 5px; border-left: 1px solid var(--border); padding-left: 10px; }
        .presence-user { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: 800; cursor: pointer; border: 2px solid var(--bg); transition: 0.2s; }
        .presence-user:hover { transform: translateY(-3px); border-color: var(--success); }

        #notif-toast { position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: white; padding: 16px 24px; border-radius: 16px; display: none; z-index: 10000; font-weight: 600; }
    </style>
</head>
<body>

<div id="notif-toast"></div>

<nav id="sidebar">
    <div style="font-weight: 800; font-size: 1.2rem; margin-bottom: 40px; color: var(--accent);">STUDYMATE</div>
    <div class="nav-item active" onclick="setView('whiteboard')" id="nav-whiteboard">Whiteboard</div>
    <div class="nav-item" onclick="setView('social')" id="nav-social">Friends Hub</div>
    
    <div class="user-block">
        <div id="my-pfp" class="pfp-wrap"></div>
        <div id="user-name" style="font-size:0.85rem; font-weight:700;">User</div>
    </div>
</nav>

<main>
    <div id="view-whiteboard" class="view active">
        <div class="room-bar">
            <span id="room-display" style="font-size: 0.7rem; font-weight: 800; color: var(--accent);">OFFLINE</span>
            <input type="text" id="room-input" placeholder="Code..." style="background:var(--bg); border:1px solid var(--border); color:white; border-radius:6px; padding:4px; width:70px;">
            <button onclick="joinRoom()" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:0.7rem;">JOIN</button>
            <button onclick="hostRoom()" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:0.7rem;">HOST</button>
            <div class="presence-list" id="presence-list"></div>
        </div>
        <div id="wb-box">
            <canvas id="wb-canvas"></canvas>
            <div class="wb-tools">
                <button class="tool-btn" id="draw-btn" onclick="setMode('draw')">✏️</button>
                <button class="tool-btn" id="drag-btn" onclick="setMode('drag')">✋</button>
                <button class="tool-btn" onclick="clearWb()">🗑️</button>
                <input type="color" id="wb-color" onchange="wbColor = this.value" style="width:30px; border:none; background:none; cursor:pointer;">
            </div>
        </div>
    </div>

    <div id="view-social" class="view">
        <div style="padding:40px; max-width:500px; margin:0 auto;">
            <h2>Friends Hub</h2>
            <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <p style="font-size:0.8rem; opacity:0.7;">YOUR ID:</p>
                <code id="my-id" style="display:block; background:black; padding:10px; border-radius:5px; margin-bottom:10px;">Loading...</code>
                <button onclick="copyId()" style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Copy My ID</button>
            </div>
        </div>
    </div>
</main>

<script>
    let currentUser, activeRoomId = null;
    let mode = 'draw', offsetX = 0, offsetY = 0, isMousedown = false, lastX, lastY;
    let wbColor = '#1e293b', wbLayers = [], participants = {};
    const canvas = document.getElementById('wb-canvas'), ctx = canvas.getContext('2d');

    window.onload = async () => {
        if (!puter.auth.isSignedIn()) await puter.auth.signIn();
        currentUser = await puter.auth.getUser();
        document.getElementById('user-name').innerText = currentUser.username;
        document.getElementById('my-id').innerText = currentUser.id;
        
        resizeWb();
        initWb();
        
        // Presence Cleanup
        setInterval(() => {
            const now = Date.now();
            let changed = false;
            for(let id in participants) {
                if(now - participants[id].lastSeen > 8000) { delete participants[id]; changed = true; }
            }
            if(changed) { renderPresence(); redraw(); }
        }, 4000);
    };

    function resizeWb() { canvas.width = 4000; canvas.height = 4000; redraw(); }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Grid
        ctx.fillStyle = "#cbd5e1";
        for (let x=0; x<canvas.width; x+=50) {
            for (let y=0; y<canvas.height; y+=50) {
                ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
            }
        }
        // Layers
        wbLayers.forEach(l => {
            ctx.beginPath();
            ctx.strokeStyle = l.color;
            ctx.lineWidth = l.width;
            ctx.lineCap = "round";
            ctx.moveTo(l.points[0].x, l.points[0].y);
            l.points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        });
        // Cursors
        for(let id in participants) {
            const p = participants[id];
            ctx.fillStyle = "#3b82f6";
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.font = "10px Inter"; ctx.fillText(p.name, p.x + 8, p.y + 3);
        }
    }

    function initWb() {
        canvas.onmousedown = (e) => {
            isMousedown = true;
            const r = canvas.getBoundingClientRect();
            const p = { x: e.clientX - r.left, y: e.clientY - r.top };
            [lastX, lastY] = [e.clientX, e.clientY];
            if(mode === 'draw') wbLayers.push({ color: wbColor, width: 3, points: [p] });
        };

        canvas.onmousemove = (e) => {
            const r = canvas.getBoundingClientRect();
            const p = { x: e.clientX - r.left, y: e.clientY - r.top };
            
            // Broadcast location
            if(activeRoomId) {
                puter.pubsub.publish(activeRoomId, JSON.stringify({
                    type: 'cursor', id: currentUser.id, name: currentUser.username, 
                    x: p.x, y: p.y, ox: offsetX, oy: offsetY
                }));
            }

            if(!isMousedown) return;

            if(mode === 'draw') {
                wbLayers[wbLayers.length-1].points.push(p);
                redraw();
            } else if(mode === 'drag') {
                offsetX += e.clientX - lastX;
                offsetY += e.clientY - lastY;
                [lastX, lastY] = [e.clientX, e.clientY];
                canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            }
        };

        canvas.onmouseup = () => { isMousedown = false; syncToCloud(); };
    }

    async function syncToCloud() {
        if(activeRoomId) puter.pubsub.publish(activeRoomId, JSON.stringify({ type: 'update', layers: wbLayers }));
    }

    // --- COLLABORATION ENGINE ---

    window.hostRoom = () => {
        const id = "STUDY-" + Math.random().toString(36).substring(2,6).toUpperCase();
        setupRoom(id);
        showToast("Hosting: " + id);
    };

    window.joinRoom = () => {
        const id = document.getElementById('room-input').value.toUpperCase();
        if(!id) return;
        setupRoom(id);
        // Request existing board from others
        puter.pubsub.publish(id, JSON.stringify({ type: 'req_sync' }));
        showToast("Joined: " + id);
    };

    function setupRoom(id) {
        activeRoomId = id;
        document.getElementById('room-display').innerText = id;
        puter.pubsub.subscribe(id, (msg) => {
            const data = JSON.parse(msg);
            if(data.id === currentUser.id) return;

            if(data.type === 'cursor') {
                participants[data.id] = { name: data.name, x: data.x, y: data.y, ox: data.ox, oy: data.oy, lastSeen: Date.now() };
                renderPresence();
                redraw();
            } else if(data.type === 'update') {
                wbLayers = data.layers;
                redraw();
            } else if(data.type === 'req_sync') {
                // Someone joined, send them the board
                puter.pubsub.publish(activeRoomId, JSON.stringify({ type: 'update', layers: wbLayers }));
            }
        });
    }

    function renderPresence() {
        const list = document.getElementById('presence-list');
        list.innerHTML = Object.keys(participants).map(id => `
            <div class="presence-user" onclick="teleport('${id}')" title="Teleport to ${participants[id].name}">
                ${participants[id].name[0].toUpperCase()}
            </div>
        `).join('');
    }

    window.teleport = (id) => {
        const p = participants[id];
        if(!p) return;
        offsetX = p.ox;
        offsetY = p.oy;
        canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        showToast("Teleported to " + p.name);
    };

    window.setMode = (m) => {
        mode = m;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m + '-btn').classList.add('active');
    };

    window.setView = (v) => {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
    };

    window.clearWb = () => { if(confirm("Clear?")) { wbLayers = []; redraw(); syncToCloud(); } };
    window.copyId = () => { navigator.clipboard.writeText(currentUser.id); showToast("ID Copied!"); };
    function showToast(m) { const t = document.getElementById('notif-toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000); }
</script>

</body>
</html>
