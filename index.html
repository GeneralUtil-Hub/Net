<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos Collaborative Pro</title>
    <!-- Ably Realtime SDK -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <!-- Full Desmos API -->
    <script src="https://www.desmos.com/api/v1.10/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #calculator {
            width: 100%;
            height: calc(100vh - 64px);
        }
        .dcg-container {
            font-family: inherit !important;
        }
        /* Custom Scrollbar for Desmos Sidebar */
        .dcg-exppanel-container::-webkit-scrollbar {
            width: 6px;
        }
        .dcg-exppanel-container::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <div id="app" class="h-screen flex flex-col">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm z-50">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-indigo-200 shadow-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 7L3 12l6 5m6-10l6 5-6 5M12 9v6"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-slate-900 leading-none">MathBoard<span class="text-indigo-600">Live</span></h1>
                    <div id="connection-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 flex items-center gap-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                        Offline
                    </div>
                </div>
            </div>

            <!-- Room Info & Sync -->
            <div id="room-controls" class="hidden flex items-center gap-3">
                <button onclick="forceSync()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors group" title="Force Sync State">
                    <svg class="w-5 h-5 group-active:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>

                <div class="h-8 w-[1px] bg-slate-200 mx-1"></div>

                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Code</span>
                    <span id="display-code" class="font-mono font-bold text-indigo-600 uppercase">------</span>
                    <button onclick="copyCode()" class="ml-1 text-slate-400 hover:text-indigo-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>

                <div id="user-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-50 text-indigo-700 border border-indigo-100 text-xs font-bold">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span id="user-count">1</span>
                </div>
            </div>
        </header>

        <main class="flex-grow relative">
            <!-- Overlay UI -->
            <div id="landing" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
                <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4 border border-slate-100">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Collaborative Graphing</h2>
                    <p class="text-slate-500 text-sm mb-8 leading-relaxed">Everything you do—equations, sliders, zooming—is synced instantly.</p>
                    
                    <div class="space-y-3">
                        <button onclick="setup('create')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                            Create Private Room
                        </button>
                        
                        <div class="flex items-center gap-3 py-2">
                            <div class="flex-grow h-[1px] bg-slate-100"></div>
                            <span class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">or</span>
                            <div class="flex-grow h-[1px] bg-slate-100"></div>
                        </div>

                        <div class="flex gap-2">
                            <input type="text" id="join-input" placeholder="CODE" maxlength="6" class="flex-grow bg-slate-50 border border-slate-200 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono font-bold uppercase">
                            <button onclick="setup('join')" class="bg-slate-900 hover:bg-black text-white px-6 py-3 rounded-xl font-bold transition-all active:scale-[0.98]">Join</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Desmos Interface -->
            <div id="calculator"></div>
        </main>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-xl shadow-2xl opacity-0 pointer-events-none transition-all duration-300 translate-y-4 text-xs font-bold z-[200]">
            Notification
        </div>
    </div>

    <script>
        const ABLY_KEY = "LJhgHg.rF2whQ:Imz-F_d5gOcMGAiJNWIGjhaAXXba8Hpbefj3LtPaT0s";
        let calculator, ably, channel, currentRoomCode;
        let isProcessingRemote = false;
        let updateDebounce;
        let myClientId = 'user-' + Math.random().toString(36).substr(2, 5);

        // Initialize Full Desmos
        const elt = document.getElementById('calculator');
        calculator = Desmos.GraphingCalculator(elt, {
            keypad: true,
            expressions: true,
            settingsMenu: true,
            zoomButtons: true,
            expressionsTopbar: true,
            pointsOfInterest: true,
            trace: true,
            border: false
        });

        async function setup(mode) {
            const codeInput = document.getElementById('join-input');
            const code = mode === 'create' ? Math.random().toString(36).substr(2, 6).toUpperCase() : codeInput.value.trim().toUpperCase();
            
            if (mode === 'join' && code.length < 3) {
                showToast("Please enter a valid room code.");
                return;
            }

            try {
                ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myClientId });
                
                ably.connection.on('connected', () => {
                    const status = document.getElementById('connection-status');
                    status.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div> Connected`;
                    status.classList.replace('text-slate-400', 'text-indigo-600');
                });

                channel = ably.channels.get(`room-${code}`);

                // Sync Logic: Listen for updates
                channel.subscribe('update', (msg) => {
                    if (msg.clientId === myClientId) return;
                    
                    const remoteState = msg.data;
                    const localState = calculator.getState();

                    // Deep compare to prevent oscillation
                    if (JSON.stringify(remoteState) === JSON.stringify(localState)) return;

                    isProcessingRemote = true;
                    calculator.setState(remoteState);
                    
                    // Release lock after a tick to ensure Desmos has processed the state
                    setTimeout(() => { isProcessingRemote = false; }, 50);
                });

                // Request initial state if joining
                if (mode === 'join') {
                    channel.publish('request-sync', { requester: myClientId });
                }

                // Answer sync requests (if we are the one already in the room)
                channel.subscribe('request-sync', (msg) => {
                    if (msg.clientId !== myClientId) {
                        channel.publish('update', calculator.getState());
                    }
                });

                // Presence tracking
                channel.presence.subscribe('enter', updateMembers);
                channel.presence.subscribe('leave', updateMembers);
                channel.presence.subscribe('present', updateMembers);
                channel.presence.enter();

                // UI Transitions
                currentRoomCode = code;
                document.getElementById('display-code').innerText = code;
                document.getElementById('landing').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('room-controls').classList.remove('hidden');

                // Observe Desmos Changes
                calculator.observe('change', () => {
                    if (isProcessingRemote) return;

                    clearTimeout(updateDebounce);
                    updateDebounce = setTimeout(() => {
                        const state = calculator.getState();
                        channel.publish('update', state);
                    }, 100);
                });

            } catch (err) {
                console.error(err);
                showToast("Connection failed. Try refreshing.");
            }
        }

        async function updateMembers() {
            const members = await channel.presence.get();
            document.getElementById('user-count').innerText = members.length;
        }

        function forceSync() {
            if (channel) {
                channel.publish('update', calculator.getState());
                showToast("State broadcasted to all users.");
            }
        }

        function copyCode() {
            const code = document.getElementById('display-code').innerText;
            navigator.clipboard.writeText(code);
            showToast("Room code copied to clipboard!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
