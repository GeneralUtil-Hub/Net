<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate Pro | Real-Time Collaboration</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] { 
            --bg: #0b0f1a; --card: #161b2c; --text: #f8fafc; --accent: #3b82f6; 
            --border: #2d364d; --sidebar: #060912; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 100; flex-shrink: 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; color: #94a3b8; font-size: 0.9rem; font-weight: 500; }
        .nav-item.active { background: var(--accent); color: white; }
        
        main { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .view { display: none; width: 100%; height: 100%; overflow-y: auto; }
        .view.active { display: flex; flex-direction: column; }

        /* Whiteboard Specific */
        #wb-box { flex: 1; position: relative; background: #ffffff; overflow: hidden; }
        #wb-canvas { position: absolute; top: 0; left: 0; background: transparent; transform-origin: 0 0; }
        .wb-tools { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 10px 20px; border-radius: 50px; display: flex; gap: 10px; border: 1px solid var(--border); z-index: 200; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tool-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; font-size: 1.2rem; }
        .tool-btn.active { background: var(--accent); color: white; }
        
        .room-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; z-index: 200; }
        .presence-user { width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; cursor: pointer; border: 2px solid var(--bg); }

        /* SRS Flashcards */
        .study-grid { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; }
        .flashcard { background: var(--card); width: 100%; min-height: 300px; border-radius: 25px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; padding: 30px; }
        
        #notif-toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 12px 20px; border-radius: 10px; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="notif-toast"></div>

<nav id="sidebar">
    <h2 style="color: var(--accent); margin-bottom: 30px;">STUDYMATE</h2>
    <div class="nav-item active" id="nav-study" onclick="setView('study')">📚 Study</div>
    <div class="nav-item" id="nav-whiteboard" onclick="setView('whiteboard')">🎨 Whiteboard</div>
    <div class="nav-item" id="nav-deck" onclick="setView('deck')">📂 Decks</div>
    <div class="nav-item" id="nav-social" onclick="setView('social')">👥 Social</div>
</nav>

<main>
    <div id="view-study" class="view active">
        <div class="study-grid">
            <div id="card-box" class="flashcard" onclick="flip()"><div id="card-content">Add cards to start!</div></div>
            <div id="srs-btns" style="display:none; gap:10px; margin-top:20px; width:100%;">
                <button onclick="rate('hard')" style="flex:1; background:var(--danger); padding:15px; border-radius:10px; border:none; color:white; font-weight:800;">HARD</button>
                <button onclick="rate('easy')" style="flex:1; background:var(--success); padding:15px; border-radius:10px; border:none; color:white; font-weight:800;">EASY</button>
            </div>
            <div style="margin-top:20px; display:flex; width:100%; gap:10px;">
                <input type="text" id="ai-in" placeholder="Topic or Q | A..." style="flex:1; background:var(--card); border:1px solid var(--border); color:white; padding:12px; border-radius:10px;">
                <button onclick="handleCreation()" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:10px;">Add</button>
            </div>
        </div>
    </div>

    <div id="view-whiteboard" class="view">
        <div class="room-bar">
            <span id="room-display" style="font-size:0.7rem; font-weight:800;">OFFLINE</span>
            <input type="text" id="room-input" placeholder="Code" style="width:60px; background:var(--bg); border:1px solid var(--border); color:white;">
            <button onclick="joinRoom()" style="background:var(--accent); color:white; border:none; padding:4px 8px; border-radius:4px;">JOIN</button>
            <button onclick="hostRoom()" style="background:var(--success); color:white; border:none; padding:4px 8px; border-radius:4px;">HOST</button>
            <div id="presence-list" class="presence-list"></div>
        </div>
        <div id="wb-box">
            <canvas id="wb-canvas"></canvas>
            <div class="wb-tools">
                <button class="tool-btn" id="ptr-btn" onclick="setMode('pointer')">🖱️</button>
                <button class="tool-btn active" id="drw-btn" onclick="setMode('draw')">✏️</button>
                <button class="tool-btn" id="ers-btn" onclick="setMode('eraser')">🧼</button>
                <button class="tool-btn" id="txt-btn" onclick="setMode('text')">T</button>
                <button class="tool-btn" id="mov-btn" onclick="setMode('drag')">✋</button>
                <input type="file" id="img-up" hidden onchange="uploadImg(this)">
                <button class="tool-btn" onclick="document.getElementById('img-up').click()">🖼️</button>
                <button class="tool-btn" onclick="clearWb()" style="color:var(--danger)">🗑️</button>
                <input type="color" onchange="wbColor = this.value" style="width:25px; border:none;">
            </div>
        </div>
    </div>
</main>

<script>
    let deck = [], flipped = false, currentUser;
    let mode = 'draw', offsetX = 0, offsetY = 0, isMousedown = false, lastX, lastY;
    let wbColor = '#1e293b', wbLayers = [], participants = {}, activeRoomId = null;
    let selectedObj = null;

    const canvas = document.getElementById('wb-canvas'), ctx = canvas.getContext('2d');

    window.onload = async () => {
        if (!puter.auth.isSignedIn()) await puter.auth.signIn();
        currentUser = await puter.auth.getUser();
        
        const saved = await puter.kv.get('sm_deck_v11'); if(saved) deck = JSON.parse(saved);
        resizeWb(); initWb(); refreshStudy();

        setInterval(() => {
            const now = Date.now();
            let changed = false;
            for(let id in participants) { if(now - participants[id].lastSeen > 8000) { delete participants[id]; changed = true; } }
            if(changed) { renderPresence(); redraw(); }
        }, 4000);
    };

    function setView(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        if(v === 'whiteboard') redraw();
    }

    // --- WHITEBOARD TOOLS ---
    function resizeWb() { canvas.width = 4000; canvas.height = 4000; redraw(); }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Dots
        ctx.fillStyle = "#cbd5e1";
        for (let x=0; x<canvas.width; x+=50) for (let y=0; y<canvas.height; y+=50) { ctx.beginPath(); ctx.arc(x, y, 0.8, 0, Math.PI*2); ctx.fill(); }
        
        wbLayers.forEach(l => {
            if(l.type === 'path') {
                ctx.beginPath(); ctx.strokeStyle = l.color; ctx.lineWidth = l.width; ctx.lineCap = "round";
                ctx.moveTo(l.points[0].x, l.points[0].y);
                l.points.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
            } else if(l.type === 'text') {
                ctx.fillStyle = l.color; ctx.font = "20px Inter"; ctx.fillText(l.val, l.x, l.y);
                l.w = ctx.measureText(l.val).width; l.h = 20;
            } else if(l.type === 'img' && l.el) {
                ctx.drawImage(l.el, l.x, l.y, l.w, l.h);
            }
            if(l === selectedObj) { ctx.strokeStyle = '#3b82f6'; ctx.strokeRect(l.x-2, l.y-2, (l.w||20)+4, (l.h||20)+4); }
        });

        for(let id in participants) {
            const p = participants[id]; ctx.fillStyle = "#3b82f6"; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.font = "10px Inter"; ctx.fillText(p.name, p.x + 8, p.y + 3);
        }
    }

    function initWb() {
        const getP = (e) => { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
        canvas.onmousedown = (e) => {
            isMousedown = true; [lastX, lastY] = [e.clientX, e.clientY];
            const p = getP(e);
            if(mode === 'pointer') {
                selectedObj = wbLayers.findLast(l => p.x > l.x && p.x < l.x + (l.w||20) && p.y > l.y && p.y < l.y + (l.h||20));
                redraw();
            } else if(mode === 'draw' || mode === 'eraser') {
                wbLayers.push({ type:'path', color: mode==='eraser'?'#ffffff':wbColor, width: mode==='eraser'?30:3, points:[p], x:p.x, y:p.y });
            } else if(mode === 'text') {
                const val = prompt("Text:"); if(val) wbLayers.push({ type:'text', val, x:p.x, y:p.y, color:wbColor });
                isMousedown = false; redraw(); sync();
            }
        };

        canvas.onmousemove = (e) => {
            const p = getP(e);
            if(activeRoomId) puter.pubsub.publish(activeRoomId, JSON.stringify({type:'cursor', id:currentUser.id, name:currentUser.username, x:p.x, y:p.y, ox:offsetX, oy:offsetY}));
            if(!isMousedown) return;
            if(mode === 'draw' || mode === 'eraser') {
                wbLayers[wbLayers.length-1].points.push(p); redraw();
            } else if(mode === 'drag') {
                offsetX += e.clientX - lastX; offsetY += e.clientY - lastY;
                [lastX, lastY] = [e.clientX, e.clientY]; canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            } else if(mode === 'pointer' && selectedObj) {
                selectedObj.x += e.clientX - lastX; selectedObj.y += e.clientY - lastY;
                [lastX, lastY] = [e.clientX, e.clientY]; redraw();
            }
        };
        canvas.onmouseup = () => { isMousedown = false; sync(); };
    }

    async function sync() { if(activeRoomId) { const clean = wbLayers.map(l => { const {el, ...rest} = l; return rest; }); puter.pubsub.publish(activeRoomId, JSON.stringify({type:'update', layers:clean})); } }

    window.uploadImg = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                wbLayers.push({ type:'img', src: e.target.result, el: img, x: 500, y: 500, w: 200, h: 200 });
                redraw(); sync();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    };

    // --- COLLABORATION ---
    window.hostRoom = () => { const id = "ROOM-" + Math.random().toString(36).substring(2,6).toUpperCase(); setupRoom(id); showToast("Hosting: "+id); };
    window.joinRoom = () => { const id = document.getElementById('room-input').value.toUpperCase(); if(id) { setupRoom(id); puter.pubsub.publish(id, JSON.stringify({type:'req_sync'})); showToast("Joined: "+id); } };

    function setupRoom(id) {
        activeRoomId = id; document.getElementById('room-display').innerText = id;
        puter.pubsub.subscribe(id, async (msg) => {
            const data = JSON.parse(msg); if(data.id === currentUser.id) return;
            if(data.type === 'cursor') { participants[data.id] = { ...data, lastSeen: Date.now() }; renderPresence(); redraw(); }
            else if(data.type === 'update') {
                wbLayers = await Promise.all(data.layers.map(async l => {
                    if(l.type === 'img') { const el = new Image(); el.src = l.src; await new Promise(r=>el.onload=r); return { ...l, el }; }
                    return l;
                }));
                redraw();
            } else if(data.type === 'req_sync') { sync(); }
        });
    }

    function renderPresence() {
        document.getElementById('presence-list').innerHTML = Object.keys(participants).map(id => `
            <div class="presence-user" onclick="teleport('${id}')">${participants[id].name[0].toUpperCase()}</div>
        `).join('');
    }

    window.teleport = (id) => { const p = participants[id]; offsetX = p.ox; offsetY = p.oy; canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`; redraw(); };

    // --- SRS/FLASHCARDS ---
    function refreshStudy() {
        const c = document.getElementById('card-content');
        c.innerHTML = (deck.length > 0) ? (flipped ? deck[0].back : deck[0].front) : "No cards!";
        if(window.MathJax) MathJax.typesetPromise();
    }
    window.flip = () => { if(deck.length>0) { flipped = !flipped; document.getElementById('srs-btns').style.display = flipped?'flex':'none'; refreshStudy(); } };
    window.rate = (r) => { const card = deck.shift(); if(r==='hard') deck.push(card); flipped = false; document.getElementById('srs-btns').style.display = 'none'; refreshStudy(); };
    window.handleCreation = async () => {
        const v = document.getElementById('ai-in').value;
        if(v.includes('|')) { const [q,a] = v.split('|'); deck.push({front:q.trim(), back:a.trim()}); }
        else { showToast("AI Thinking..."); const r = await puter.ai.chat(`3 flashcards for ${v}. Format: Q | A`); r.message.content.split('\n').forEach(l => { if(l.includes('|')) { const [q,a]=l.split('|'); deck.push({front:q.trim(), back:a.trim()}); } }); }
        document.getElementById('ai-in').value = ""; await puter.kv.set('sm_deck_v11', JSON.stringify(deck)); refreshStudy();
    };

    window.setMode = (m) => { mode = m; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById(m.substring(0,3)+'-btn').classList.add('active'); };
    window.clearWb = () => { if(confirm("Clear?")) { wbLayers = []; redraw(); sync(); } };
    function showToast(m) { const t = document.getElementById('notif-toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
</script>
</body>
</html>
