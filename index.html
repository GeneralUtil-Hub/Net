<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Desmos</title>
    <!-- Ably SDK -->
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <!-- Desmos API (Demo Key) -->
    <script src="https://www.desmos.com/api/v1.10/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #calculator {
            width: 100%;
            height: calc(100vh - 64px);
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans overflow-hidden">

    <div id="app" class="h-screen flex flex-col">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shadow-sm z-50">
            <div class="flex items-center gap-2">
                <div class="bg-red-500 p-1.5 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h1 class="font-bold text-xl text-slate-800 tracking-tight">Desmos<span class="text-red-500">Live</span></h1>
            </div>

            <div id="room-info" class="hidden flex items-center gap-4">
                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Room:</span>
                    <span id="display-code" class="font-mono font-bold text-slate-800">------</span>
                    <button onclick="copyCode()" class="hover:text-blue-600 transition-colors ml-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
                <div id="user-count" class="flex items-center gap-1 text-slate-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span class="text-sm font-medium">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow relative">
            <!-- Landing Screen Overlay -->
            <div id="landing" class="absolute inset-0 z-40 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
                <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full border border-slate-200">
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Multiplayer Math</h2>
                    <p class="text-slate-500 mb-8 text-sm leading-relaxed">Collaborate on complex graphs in real-time with friends.</p>
                    
                    <div class="space-y-4">
                        <button id="create-btn" onclick="createRoom()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                            <span id="create-text">Create New Graph</span>
                            <div id="create-loader" class="loading-spinner hidden"></div>
                        </button>
                        
                        <div class="relative py-4">
                            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
                            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">or join existing</span></div>
                        </div>

                        <div class="flex gap-2">
                            <input type="text" id="join-input" placeholder="Enter Code" maxlength="6" class="flex-grow border-2 border-slate-100 bg-slate-50 px-4 py-3 rounded-xl focus:border-red-500 focus:outline-none font-mono uppercase text-center tracking-widest">
                            <button id="join-btn" onclick="joinRoom()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center">
                                <span id="join-text">Join</span>
                                <div id="join-loader" class="loading-spinner hidden"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Desmos Calculator -->
            <div id="calculator"></div>
        </main>

        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-800 text-white rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4 text-sm font-medium z-[100]">
            Code copied to clipboard!
        </div>
    </div>

    <script>
        const ABLY_KEY = "LJhgHg.rF2whQ:Imz-F_d5gOcMGAiJNWIGjhaAXXba8Hpbefj3LtPaT0s";
        
        let calculator;
        let ably;
        let channel;
        let isRemoteUpdate = false;
        let currentRoomCode = '';
        let updateTimeout;
        let lastReceivedState = null;

        // Initialize Desmos
        const elt = document.getElementById('calculator');
        calculator = Desmos.GraphingCalculator(elt, {
            keypad: true,
            expressions: true,
            settingsMenu: true,
            border: false
        });

        async function connectRealtime(roomCode, isJoin = false) {
            // UI Feedback
            const btnText = isJoin ? 'join-text' : 'create-text';
            const btnLoader = isJoin ? 'join-loader' : 'create-loader';
            document.getElementById(btnText).classList.add('hidden');
            document.getElementById(btnLoader).classList.remove('hidden');

            try {
                ably = new Ably.Realtime({ key: ABLY_KEY });
                
                await new Promise((resolve, reject) => {
                    ably.connection.on('connected', resolve);
                    const timeout = setTimeout(() => reject(new Error("Connection timeout")), 10000);
                    ably.connection.on('failed', () => {
                        clearTimeout(timeout);
                        reject(new Error("Connection failed"));
                    });
                });

                currentRoomCode = roomCode.toUpperCase();
                channel = ably.channels.get(`desmos-room-${currentRoomCode}`);

                // Subscribe to state updates
                channel.subscribe('state-update', (message) => {
                    // Safety check for self-messages (Ably usually handles this via clientId, but this is extra safe)
                    if (message.connectionId === ably.connection.id) return;
                    
                    const newState = message.data;
                    
                    // Simple deep comparison check to prevent unnecessary updates
                    if (JSON.stringify(newState) === JSON.stringify(calculator.getState())) return;

                    isRemoteUpdate = true;
                    calculator.setState(newState);
                    lastReceivedState = JSON.stringify(newState);
                    
                    // Release lock after a short delay to allow Desmos to settle
                    setTimeout(() => { isRemoteUpdate = false; }, 50);
                });

                // Presence tracking
                channel.presence.subscribe('enter', updatePresence);
                channel.presence.subscribe('leave', updatePresence);
                channel.presence.subscribe('present', updatePresence);
                channel.presence.enter();

                // Room setup
                document.getElementById('landing').classList.add('hidden');
                document.getElementById('room-info').classList.remove('hidden');
                document.getElementById('display-code').innerText = currentRoomCode;

                // Sync loop
                calculator.observe('change', () => {
                    if (isRemoteUpdate) return;

                    const currentState = calculator.getState();
                    const stateString = JSON.stringify(currentState);
                    
                    // Don't broadcast if this change just brought us back to what the remote person sent
                    if (stateString === lastReceivedState) return;

                    clearTimeout(updateTimeout);
                    updateTimeout = setTimeout(() => {
                        channel.publish('state-update', currentState);
                    }, 150); // Fast enough for sliders, slow enough for rate limits
                });

            } catch (err) {
                console.error(err);
                showToast("Failed to connect. Check your API key.");
                document.getElementById(btnText).classList.remove('hidden');
                document.getElementById(btnLoader).classList.add('hidden');
            }
        }

        async function updatePresence() {
            if (!channel) return;
            const members = await channel.presence.get();
            const count = members.length;
            document.getElementById('user-count').querySelector('span').innerText = 
                count === 1 ? "1 person here" : `${count} people here`;
        }

        function createRoom() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            connectRealtime(code, false);
        }

        function joinRoom() {
            const code = document.getElementById('join-input').value.trim();
            if (code.length < 3) {
                showToast("Enter a valid room code.");
                return;
            }
            connectRealtime(code, true);
        }

        function copyCode() {
            const code = document.getElementById('display-code').innerText;
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Code copied! Send it to a friend.");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 3000);
        }
    </script>
</body>
</html>
