<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaris Collaborative Board</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #1a1a1a; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 10; display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; backdrop-filter: blur(5px); }
        canvas { display: block; background: white; cursor: crosshair; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; color: white; }
        .modal { text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; margin-bottom: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h2>Solaris Board</h2>
            <input type="text" id="roomInput" placeholder="Enter Room Name"><br>
            <button onclick="join()">Start Drawing</button>
        </div>
    </div>

    <div id="ui" style="display:none">
        <input type="color" id="colorPicker" value="#000000">
        <button onclick="clearCanvas()" style="background:#dc3545">Clear Board</button>
        <span id="status" style="color:white; line-height:35px; margin-left:10px;"></span>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let ably, channel, room;
        let isDrawing = false;
        let myColor = '#000000';
        
        // This object tracks the last [x, y] for every user by their ID
        const remoteClients = {};

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function join() {
            room = document.getElementById('roomInput').value.trim().toLowerCase();
            if(!room) return alert("Enter a room name!");
            
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('status').innerText = "Room: " + room;

            // Replace with your actual Ably API Key
            ably = new Ably.Realtime('YOUR_ABLY_API_KEY');
            channel = ably.channels.get('draw-' + room);

            // Listen for data from others
            channel.subscribe('draw', (msg) => {
                const { x, y, color, id, type } = msg.data;
                if (id === ably.auth.clientId) return;

                if (type === 'start') {
                    // Just update their position, don't draw yet
                    remoteClients[id] = { x, y };
                } else if (type === 'move' && remoteClients[id]) {
                    // Draw a line from where they WERE to where they ARE now
                    drawLine(remoteClients[id].x, remoteClients[id].y, x, y, color);
                    remoteClients[id] = { x, y };
                } else if (type === 'stop') {
                    delete remoteClients[id];
                }
            });

            channel.subscribe('clear', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        function drawLine(x1, y1, x2, y2, color) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.closePath();
        }

        let lastX = 0;
        let lastY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            lastX = e.clientX;
            lastY = e.clientY;
            // Tell others where we started so they don't draw a line from our previous position
            channel.publish('draw', { x: lastX, y: lastY, id: ably.auth.clientId, type: 'start' });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;

            const currentX = e.clientX;
            const currentY = e.clientY;

            // Draw locally
            drawLine(lastX, lastY, currentX, currentY, myColor);

            // Send to others
            channel.publish('draw', { 
                x: currentX, 
                y: currentY, 
                color: myColor, 
                id: ably.auth.clientId, 
                type: 'move' 
            });

            lastX = currentX;
            lastY = currentY;
        });

        window.addEventListener('mouseup', () => {
            if (isDrawing) {
                isDrawing = false;
                channel.publish('draw', { id: ably.auth.clientId, type: 'stop' });
            }
        });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', {});
        }

        document.getElementById('colorPicker').oninput = (e) => myColor = e.target.value;

        window.onresize = () => {
            const img = ctx.getImageData(0,0,canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(img, 0, 0);
        };
    </script>
</body>
</html>
