<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaris Collaborative Whiteboard</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .panel {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #room-info { font-weight: bold; color: #333; font-size: 0.9rem; }
        canvas { cursor: crosshair; background: white; touch-action: none; }
        
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #0056b3; }
        #clearBtn { background: #dc3545; }
        #clearBtn:hover { background: #a71d2a; }

        /* Setup Screen */
        #setup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        input[type="text"] {
            padding: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="modal">
            <h2>Join or Create a Room</h2>
            <p>Enter a room name to start drawing with friends.</p>
            <input type="text" id="roomInput" placeholder="e.g. MySecretRoom"><br>
            <button onclick="joinRoom()">Enter Board</button>
        </div>
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="panel">
            <span id="room-info">Room: </span>
            <input type="color" id="colorPicker" value="#000000">
            <button id="clearBtn">Clear Board</button>
        </div>
        <div class="panel">
            <small>Share this URL with friends to draw together!</small>
        </div>
    </div>

    <canvas id="whiteboard"></canvas>

    <script>
        const setupOverlay = document.getElementById('setup-overlay');
        const uiLayer = document.getElementById('ui-layer');
        const roomInput = document.getElementById('roomInput');
        const roomInfo = document.getElementById('room-info');
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');

        let ably, channel, roomName;
        let drawing = false;
        let color = '#000000';

        // Check if URL already has a room (e.g., index.html#RoomName)
        window.onload = () => {
            if(window.location.hash) {
                roomInput.value = window.location.hash.substring(1);
                joinRoom();
            }
        };

        function joinRoom() {
            roomName = roomInput.value.trim().toLowerCase();
            if (!roomName) return alert("Please enter a room name");

            window.location.hash = roomName;
            setupOverlay.style.display = 'none';
            uiLayer.style.display = 'flex';
            roomInfo.innerText = "Room: " + roomName;

            initAbly();
        }

        function initAbly() {
            // REPLACE THIS KEY
            ably = new Ably.Realtime('xTLjRw.7-yVUg:GK9phICjvxzGuZ6twIpLPJVh1Ek92fL20YVT9RTJnfE');
            // The channel name is specific to the room entered
            channel = ably.channels.get('room-' + roomName);

            // Sync drawing from others
            channel.subscribe('draw', (msg) => {
                draw(msg.data.x, msg.data.y, true, msg.data.color);
            });

            channel.subscribe('stop', () => ctx.beginPath());
            
            channel.subscribe('clear', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        // Drawing Logic
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function draw(x, y, isRemote = false, remoteColor) {
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.strokeStyle = isRemote ? remoteColor : color;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => {
            drawing = false;
            ctx.beginPath();
            if(channel) channel.publish('stop', {});
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing || !channel) return;
            draw(e.clientX, e.clientY);
            channel.publish('draw', { x: e.clientX, y: e.clientY, color });
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            channel.publish('clear', {});
        });

        colorPicker.addEventListener('change', (e) => color = e.target.value);

        // Handle window resizing
        window.addEventListener('resize', () => {
            const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.putImageData(temp, 0, 0);
        });
    </script>
</body>
</html>
